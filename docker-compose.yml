services:
  api:
    build: .
    container_name: api  
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=FinanceDashboard;Username=admin;Password=secret
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: db   
    ports:
      - "5432:5432"      
    environment:
      - POSTGRES_DB=FinanceDashboard
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d FinanceDashboard"]
      interval: 5s
      timeout: 5s
      retries: 5